name: Sync Upstream Release

on:
  schedule:
    # Check daily at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add upstream remote
        run: git remote add upstream https://github.com/Martian-Engineering/lossless-claw.git || true

      - name: Fetch upstream tags
        run: git fetch upstream --tags

      - name: Find latest upstream release tag
        id: latest
        run: |
          TAG=$(git tag --sort=-version:refname | grep '^v' | head -1)
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Latest upstream tag: $TAG"

      - name: Check if already merged
        id: check
        run: |
          TAG="${{ steps.latest.outputs.tag }}"
          if git merge-base --is-ancestor "$TAG" HEAD 2>/dev/null; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Already up to date with $TAG"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "New release: $TAG"
          fi

      - name: Create sync branch and merge
        if: steps.check.outputs.skip == 'false'
        run: |
          TAG="${{ steps.latest.outputs.tag }}"
          BRANCH="sync/upstream-${TAG}"
          git checkout -b "$BRANCH"
          git merge "$TAG" --no-edit || {
            echo "::warning::Merge conflict — manual resolution needed"
            git merge --abort
            exit 1
          }
          git push origin "$BRANCH"

      - name: Create PR
        if: steps.check.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.latest.outputs.tag }}"
          BRANCH="sync/upstream-${TAG}"
          gh pr create \
            --title "sync: merge upstream ${TAG}" \
            --body "$(cat <<EOF
          ## Upstream Sync

          Merges upstream release \`${TAG}\` from \`Martian-Engineering/lossless-claw\`.

          **Review checklist:**
          - [ ] \`src/engine.ts\` constructor DI still works
          - [ ] No new \`openclaw/plugin-sdk\` imports added
          - [ ] \`npm test\` passes

          Auto-generated by sync-upstream workflow.
          EOF
          )" \
            --base main \
            --head "$BRANCH"
